name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Convert content for web (convert + fruit)
        run: bun run convert:all

      - name: Create content symlink from fruit output
        run: ln -s ../../../fruit apps/web/src/content/docs/chapters

      - name: Build
        run: bun run build

  build-and-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Convert content for web (convert + fruit)
        run: bun run convert:all

      - name: Create content symlink from fruit output
        run: ln -s ../../../fruit apps/web/src/content/docs/chapters

      - name: Build for deployment
        working-directory: apps/web
        run: bun run build:deploy

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
